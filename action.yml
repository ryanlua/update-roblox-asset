name: Update Roblox Asset
description: Update assets on Roblox using Open Cloud API keys.
author: Ryan Luu

branding:
  icon: upload-cloud
  color: blue

inputs:
  api-key:
    description: "API key for Open Cloud"
    required: true
  asset-id:
    description: "Existing asset on Roblox"
    required: true
  file:
    description: "File path to the asset"
    required: true
  display-name:
    description: "Display name for the asset"
    required: false
  description:
    description: "Description for the asset"
    required: false

outputs:
  operation-id:
    description: "Operation ID for checking the update status"
    value: ${{ steps.upload.outputs.operation-id }}

runs:
  using: "composite"
  steps:
    - id: upload
      shell: bash
      env:
        API_KEY: ${{ inputs.api-key }}
        ASSET_ID: ${{ inputs.asset-id }}
        FILE_PATH: ${{ inputs.file }}
        DISPLAY_NAME: ${{ inputs.display-name }}
        DESCRIPTION: ${{ inputs.description }}
      run: |
        bash "${{ github.action_path }}/scripts/upload.sh"

    - id: poll
      shell: bash
      env:
        API_KEY: ${{ inputs.api-key }}
        OPERATION_ID: ${{ steps.upload.outputs.operation-id }}
      run: |
        bash "${{ github.action_path }}/scripts/poll.sh"
